<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goofik</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  
  <div class="bg-glow"></div>

  <div class="orbit-system">
    <div class="orbit-ring" id="orbit-1"></div>
    <div class="orbit-ring" id="orbit-2"></div>
    <div class="orbit-ring" id="orbit-3"></div>

    <img src="/src/assets/chaz.png" class="orbit-item" id="item-1" alt="chaz" />
    <img src="/src/assets/riley.png" class="orbit-item" id="item-2" alt="riley" />
    <img src="/src/assets/art3.png" class="orbit-item" id="item-3" alt="art3" />

    <div class="discord-card">
      
      <div class="profile-banner"></div>

      <div class="avatar-container">
        <div class="avatar-wrapper">
          <img src="/src/assets/avatar.jpg" alt="avatar.jpg" class="avatar-img" />
          <div class="status-online"></div>
        </div>
      </div>

      <div class="profile-content">
        <div class="profile-header">
          <h2 class="username">goofik</h2>
          <div class="custom-status">
            <span class="status-emoji">🐧</span>
            <span class="status-text">working on arch linux...</span>
          </div>
        </div>

        <div class="profile-tabs">
          <div class="tab active" data-tab="main">Details</div>
          <div class="tab" data-tab="music-covers">music covers</div>
        </div>

        <div class="tab-content">
          
          <div id="tab-main" class="tab-pane active">
            <div class="info-section">
              <h3>BIO</h3>
              <p class="bio-text">meow =P</p>
            </div>

            <div class="info-section">
              <h3>Platforms</h3>
              <div class="social-links">

                    </svg>
                  </span>
                  <div class="social-info">
                    <span class="social-name">Spotify</span>
                    <span class="social-nick">goofikx</span>
                  </div>
                </a>
          
                <a href="https://t.me/Goofikx" target="_blank" class="social-item">
                  <span class="social-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                      <path d="M11.94 2C6.47 2 2 6.47 2 12s4.47 10 9.94 10S22 17.53 22 12 17.53 2 11.94 2zm4.72 6.84l-1.6 7.53c-.12.54-.44.67-.89.42l-2.44-1.8-1.18 1.14c-.13.13-.24.24-.49.24l.18-2.5 4.55-4.11c.2-.18-.04-.28-.31-.1l-5.63 3.54-2.43-.76c-.53-.16-.54-.53.11-.78l9.49-3.66c.44-.16.83.11.62.87z"/>

                  </div>
                </a>

                <div class="social-item" id="discord-btn" style="cursor: pointer;">
                  <span class="social-icon">

                  </span>
                  <div class="social-info">
                    <span class="social-name">Discord</span>
                    <span class="social-nick" id="discord-nick">@goofikx</span>
                  </div>
                </div>

                <a href="https://steamcommunity.com/id/goofikx" target="_blank" class="social-item">
                  <span class="social-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.625 3.87 10.334 9.094 11.593l1.117-3.957a3.412 3.412 0 0 1-1.631-2.923c0-1.467 1.018-2.707 2.414-3.024l2.455-3.585a3.46 3.46 0 0 1 3.526-3.447c1.925 0 3.493 1.57 3.493 3.495 0 1.924-1.568 3.493-3.493 3.493a3.42 3.42 0 0 1-1.89-.567l-3.513 2.503a3.428 3.428 0 0 1-2.977 1.63c-.15 0-.295-.015-.44-.035l-1.144 4.053A12.012 12.012 0 0 0 12 24.297c6.63 0 12-5.373 12-12 0-6.627-5.373-12-12-12zm4.975 12.183a1.484 1.484 0 1 0 0-2.967 1.484 1.484 0 0 0 0 2.967z"/>

                  </span>
                  <div class="social-info">
                    <span class="social-name">Steam</span>
                    <span class="social-nick">Goofik</span>
                  </div>
                </a>

              </div>
            </div>
            
            <div class="info-section">
              <h3>Роли</h3>
              <div class="roles-list">
                <span class="role-badge"><span class="role-dot" style="background: #3b82f6;"></span>Admin</span>
                <span class="role-badge"><span class="role-dot" style="background: #eab308;"></span>Arch User</span>
                <span class="role-badge"><span class="role-dot" style="background: #22c55e;"></span>DIY Builder</span>
              </div>
            </div>
          </div>

          <div id="tab-music-covers" class="tab-pane">
            <div class="slider-container">
              
              <button class="slider-btn prev-btn" onclick="changeSlide(-1)">❮</button>
              
              <div class="slider-wrapper" id="covers-container"></div>
              
              <button class="slider-btn next-btn" onclick="changeSlide(1)">❯</button>
              
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
